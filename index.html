<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0c0c10"/>
<title>Rotina</title>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c10;--s1:#13131a;--s2:#1a1a24;--b1:#22222e;--b2:#2e2e3e;
  --text:#ddd8cc;--muted:#4a4a62;--muted2:#6a6a86;
  --accent:#e8c547;--green:#a8e05a;--danger:#e05a5a;--blue:#7ab4ff;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--b1);z-index:10;}
.brand{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:3px;color:var(--accent);}
.brand span{color:var(--muted);font-weight:400;}
.week-badge{font-family:var(--mono);font-size:10px;color:var(--muted);}

/* VIEWS */
.views{flex:1;overflow:hidden;position:relative;}
.view{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.view.active{display:flex;}

/* BOTTOM NAV */
.bottom-nav{display:flex;background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0;padding-bottom:var(--sab);z-index:10;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;border:none;background:transparent;color:var(--muted2);font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:color .15s;}
.bnav-btn svg{width:20px;height:20px;}
.bnav-btn.active{color:var(--accent);}

::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ═══ SCORE BANNER ═══ */
.score-banner{display:flex;align-items:center;gap:0;padding:0 14px;height:34px;flex-shrink:0;border-bottom:1px solid var(--b1);background:var(--s1);}
.score-item{display:flex;align-items:center;gap:6px;flex:1;}
.score-item+.score-item{border-left:1px solid var(--b1);padding-left:12px;margin-left:12px;}
.score-item-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.score-item-value{font-family:var(--mono);font-size:14px;font-weight:700;line-height:1;}
.score-item-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:auto;}

/* ═══ TRACKER ═══ */
.tracker-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tracker-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.day-strip{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--b1);scrollbar-width:none;}
.day-strip::-webkit-scrollbar{display:none;}
.day-pill{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;border-radius:10px;border:1px solid var(--b1);background:var(--s1);cursor:pointer;transition:all .15s;font-family:var(--mono);color:var(--muted2);min-width:52px;}
.dp-name{font-size:10px;letter-spacing:2px;font-weight:600;}
.dp-pct{font-size:9px;color:var(--muted);}
.day-pill.active{border-color:var(--accent);background:rgba(232,197,71,.08);color:var(--accent);}
.day-pill.active .dp-pct{color:var(--accent);}
.day-pill.today .dp-name::after{content:'·';color:var(--green);margin-left:2px;}
.day-pill.all-done{border-color:rgba(168,224,90,.35);}
.day-pill.all-done .dp-pct{color:var(--green);}

.tasks-area{flex:1;overflow-y:auto;padding:14px 14px 0;}
.day-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.day-title{font-family:var(--mono);font-size:18px;font-weight:700;}
.day-pts{font-family:var(--mono);font-size:11px;color:var(--muted);}
.dprog-wrap{height:3px;background:var(--b2);border-radius:2px;margin-bottom:14px;}
.dprog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.dprog-fill.done{background:var(--green);}

.task-card{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:10px;border:1px solid var(--b1);background:var(--s1);cursor:pointer;transition:all .15s;user-select:none;margin-bottom:8px;}
.task-card:active{transform:scale(.98);}
.task-card.checked{border-color:#1e2e10;background:#0f180a;opacity:.55;}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--b2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.task-card.checked .chk{background:var(--green);border-color:var(--green);}
.chk-svg{display:none;}
.task-card.checked .chk-svg{display:block;}
.t-icon{font-size:19px;flex-shrink:0;}
.t-info{flex:1;min-width:0;}
.t-label{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-card.checked .t-label{text-decoration:line-through;color:var(--muted);}
.t-meta{display:flex;align-items:center;gap:8px;margin-top:2px;}
.t-time{font-family:var(--mono);font-size:10px;color:var(--muted);}
.view-toggle-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--b2);background:transparent;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto;transition:all .15s;}
.view-toggle-btn:hover{border-color:var(--accent);color:var(--accent);}
.view-toggle-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(232,197,71,.08);}
.view-toggle-btn svg{width:15px;height:15px;}

/* ═══ KANBAN ═══ */
.kanban-panel{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;gap:10px;padding:12px 14px;scrollbar-width:thin;}
.kanban-panel::-webkit-scrollbar{height:4px;}
.kanban-panel::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.kb-col{flex:0 0 200px;display:flex;flex-direction:column;gap:0;border-radius:10px;border:1px solid var(--b1);background:var(--s1);overflow:hidden;}
.kb-col.kb-today{border-color:rgba(232,197,71,.35);}
.kb-col-hdr{padding:10px 12px 8px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.kb-col-name{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text);}
.kb-col.kb-today .kb-col-name{color:var(--accent);}
.kb-col-meta{display:flex;align-items:center;gap:6px;margin-top:4px;}
.kb-col-pct{font-family:var(--mono);font-size:9px;color:var(--muted);}
.kb-prog{flex:1;height:3px;background:var(--b2);border-radius:2px;}
.kb-prog-fill{height:100%;border-radius:2px;transition:width .4s;}
.kb-tasks{flex:1;overflow-y:auto;padding:8px 8px;display:flex;flex-direction:column;gap:6px;scrollbar-width:none;}
.kb-tasks::-webkit-scrollbar{display:none;}
.kb-card{border-radius:8px;border:1px solid var(--b1);background:var(--bg);padding:9px 10px;cursor:pointer;transition:all .15s;user-select:none;}
.kb-card:active{transform:scale(.97);}
.kb-card.kb-done{opacity:.45;border-color:rgba(168,224,90,.2);background:#0a120a;}
.kb-card.kb-conflict{border-color:rgba(224,90,90,.35);background:#130a0a;}
.kb-card-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.kb-chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.kb-card.kb-done .kb-chk{background:var(--green);border-color:var(--green);}
.kb-icon{font-size:14px;flex-shrink:0;}
.kb-label{font-size:12px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kb-card.kb-done .kb-label{text-decoration:line-through;color:var(--muted);}
.kb-footer{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.kb-time{font-family:var(--mono);font-size:9px;color:var(--muted);}
.kb-pts{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:6px;background:rgba(232,197,71,.1);color:var(--accent);}
.kb-card.kb-done .kb-pts{background:rgba(168,224,90,.1);color:var(--green);}
.kb-conflict-tag{font-family:var(--mono);font-size:8px;color:var(--danger);}
.kb-empty{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:center;padding:16px 0;letter-spacing:1px;}
.t-conflict-badge{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(224,90,90,.12);color:var(--danger);letter-spacing:.5px;}
.task-card.conflict{border-color:rgba(224,90,90,.35);background:#160e0e;}
.task-card.conflict.checked{border-color:#1e2e10;background:#0f180a;}
.ed-row.ed-conflict{border-color:rgba(224,90,90,.4);}
.time-display-btn.conflict{border-color:rgba(224,90,90,.5);color:var(--danger);}
.time-display-btn.conflict .tdb-val{color:var(--danger);}
.t-delete{width:28px;height:28px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.t-delete:hover{background:rgba(224,90,90,.15);border-color:var(--danger);color:var(--danger);}
@media(hover:hover){.t-delete{opacity:0;}.task-card:hover .t-delete{opacity:1;}}

.week-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--b1);flex-shrink:0;background:var(--s1);}
.wb-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.wb-track{flex:1;height:5px;background:var(--b2);border-radius:3px;}
.wb-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .5s;}
.wb-pct{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);min-width:36px;text-align:right;}

/* ═══ HISTORY ═══ */
#view-history{overflow-y:auto;}
.hist-header{padding:20px 16px 8px;}
.hist-title{font-family:var(--mono);font-size:16px;font-weight:700;}
.hist-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.hist-list{padding:12px 16px 24px;display:flex;flex-direction:column;gap:10px;}
.hist-card{border:1px solid var(--b1);border-radius:12px;background:var(--s1);overflow:hidden;}
.hist-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.hw-label{font-family:var(--mono);font-size:12px;font-weight:600;}
.hw-meta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px;}
.h-badge{font-family:var(--mono);font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:8px;}
.h-badge.gs{background:rgba(168,224,90,.12);color:var(--green);}
.h-badge.ga{background:rgba(232,197,71,.12);color:var(--accent);}
.h-badge.gb{background:rgba(122,180,255,.12);color:var(--blue);}
.h-badge.gc{background:rgba(224,90,90,.12);color:var(--danger);}
.h-chevron{font-size:9px;color:var(--muted);transition:transform .2s;display:inline-block;}
.hist-card-hdr.open .h-chevron{transform:rotate(180deg);}
.h-prog{height:3px;background:var(--b2);}
.h-prog-fill{height:100%;transition:width .5s;}
.h-detail{display:none;padding:12px 16px;border-top:1px solid var(--b1);}
.h-detail.open{display:block;}
.h-day-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s;}
.h-day-row:hover{background:rgba(255,255,255,.02);}
.h-day-row:last-of-type{border-bottom:none;}
.h-day-chevron{font-size:13px;color:var(--muted);margin-left:2px;transition:transform .2s;display:inline-block;width:12px;flex-shrink:0;}
.h-task-list{display:none;background:var(--bg);border-bottom:1px solid var(--b1);padding:4px 0;}
.h-task-list.open{display:block;}
.h-task-row{display:flex;align-items:center;gap:10px;padding:7px 12px;}
.h-task-row.h-task-done{opacity:.6;}
.h-task-chk{font-family:var(--mono);font-size:11px;width:14px;flex-shrink:0;color:var(--green);}
.h-task-row:not(.h-task-done) .h-task-chk{color:var(--muted);}
.h-task-icon{font-size:15px;flex-shrink:0;}
.h-task-label{flex:1;font-size:12px;color:var(--text);}
.h-task-row.h-task-done .h-task-label{text-decoration:line-through;color:var(--muted);}
.h-task-pts{font-family:var(--mono);font-size:10px;flex-shrink:0;}
.h-day-name{font-family:var(--mono);font-size:10px;color:var(--muted2);width:36px;flex-shrink:0;}
.h-bar-wrap{flex:1;height:4px;background:var(--b2);border-radius:2px;}
.h-bar-fill{height:100%;border-radius:2px;}
.h-day-pct{font-family:var(--mono);font-size:10px;color:var(--muted);width:30px;text-align:right;flex-shrink:0;}
.h-score-num{font-family:var(--mono);font-size:11px;font-weight:700;width:36px;text-align:right;flex-shrink:0;}
.hist-empty{text-align:center;padding:48px 24px;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;line-height:2.2;text-transform:uppercase;}

/* ═══ EDITOR ═══ */
.editor-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--s1);}
.editor-day-label{font-family:var(--mono);font-size:14px;font-weight:700;}
.ed-daytabs{display:flex;gap:5px;padding:10px 14px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--b1);scrollbar-width:none;}
.ed-daytabs::-webkit-scrollbar{display:none;}
.ed-tab{flex:0 0 auto;padding:6px 11px;border-radius:8px;border:1px solid var(--b1);background:transparent;color:var(--muted2);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.ed-tab.active{border-color:var(--accent);background:rgba(232,197,71,.08);color:var(--accent);}

.editor-tasks{flex:1;overflow-y:auto;padding:12px 14px;}
.ed-row{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px;}
.ed-row-r1{display:grid;grid-template-columns:44px 1fr auto;gap:8px;align-items:center;}
.ed-row-r2{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;}
.ed-row-r3{display:flex;align-items:center;gap:8px;}
.pts-label{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;}
.pts-slider{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--b2);outline:none;cursor:pointer;}
.pts-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);}
.pts-val{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);width:20px;text-align:right;}

.ed-add-row{background:var(--s2);border:1px dashed var(--b2);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px;}
.ifield{padding:9px 12px;border-radius:8px;border:1px solid var(--b2);background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s;width:100%;}
.ifield:focus{border-color:var(--accent);}
.ifield-icon-btn{width:44px;height:38px;border-radius:8px;border:1px solid var(--b2);background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s;flex-shrink:0;}
.ifield-icon-btn:hover,.ifield-icon-btn.open{border-color:var(--accent);}

/* TIME PICKER */
.time-display-btn{
  display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;
  border:1px solid var(--b2);background:var(--bg);cursor:pointer;transition:border-color .15s;
  font-family:var(--mono);font-size:12px;color:var(--text);width:100%;
}
.time-display-btn:hover,.time-display-btn.open{border-color:var(--accent);color:var(--accent);}
.time-display-btn svg{width:13px;height:13px;flex-shrink:0;color:var(--muted);}
.tdb-val{flex:1;}

.editor-footer{padding:12px 14px;border-top:1px solid var(--b1);flex-shrink:0;background:var(--s1);display:flex;gap:8px;padding-bottom:calc(12px + var(--sab));}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#0c0c10;font-weight:700;}
.btn-primary:hover{background:#f5d55a;border-color:#f5d55a;color:#0c0c10;}
.btn-danger{color:var(--danger);border-color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-sq{width:38px;height:38px;padding:0;}
.empty{text-align:center;padding:40px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;}

/* ═══ ICON PICKER MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;}
#iconModal{z-index:300;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--s1);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:0;max-height:70vh;display:flex;flex-direction:column;padding-bottom:var(--sab);}
.modal-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:12px auto 0;}
.modal-title{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:12px 16px 8px;}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;padding:8px 16px 16px;overflow-y:auto;}
.icon-opt{font-size:22px;padding:6px;border-radius:8px;cursor:pointer;text-align:center;border:1px solid transparent;transition:all .15s;}
.icon-opt:hover{background:var(--s2);border-color:var(--b2);}
.icon-opt.selected{border-color:var(--accent);background:rgba(232,197,71,.1);}

/* ═══ TIME PICKER MODAL ═══ */
.time-modal-sheet{background:var(--s1);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding-bottom:var(--sab);display:flex;flex-direction:column;}
.time-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;}
.time-modal-title{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.time-modal-done{font-family:var(--mono);font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:700;letter-spacing:1px;}

.time-pickers-wrap{display:flex;gap:0;padding:8px 20px 20px;align-items:center;justify-content:center;gap:8px;}
.time-picker-group{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.tpg-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.tpg-pickers{display:flex;gap:4px;align-items:center;}
.time-sep{font-family:var(--mono);font-size:20px;color:var(--muted);padding:0 2px;margin-top:-4px;}
.drum-wrap{position:relative;width:56px;height:120px;overflow:hidden;border-radius:10px;border:1px solid var(--b2);background:var(--bg);}
.drum-wrap::before,.drum-wrap::after{content:'';position:absolute;left:0;right:0;height:36px;z-index:2;pointer-events:none;}
.drum-wrap::before{top:0;background:linear-gradient(to bottom,var(--bg),transparent);}
.drum-wrap::after{bottom:0;background:linear-gradient(to top,var(--bg),transparent);}
.drum-selector{position:absolute;top:50%;left:4px;right:4px;height:36px;transform:translateY(-50%);border:1px solid var(--accent);border-radius:7px;background:rgba(232,197,71,.06);pointer-events:none;z-index:1;}
.drum-list{display:flex;flex-direction:column;align-items:center;transition:transform .15s ease;padding:42px 0;}
.drum-item{height:36px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:17px;font-weight:600;color:var(--muted);cursor:pointer;width:100%;user-select:none;transition:color .1s;}
.drum-item.active{color:var(--accent);}
.between-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-align:center;padding:0 4px;}

/* TOAST */
.toast{position:fixed;bottom:calc(64px + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--accent);color:#0c0c10;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;padding:9px 18px;border-radius:8px;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ MATERIAIS TABS ═══ */
.refs-header{padding:16px 16px 0;flex-shrink:0;border-bottom:1px solid var(--b1);}
.refs-title{font-family:var(--mono);font-size:15px;font-weight:700;margin-bottom:10px;}
.refs-tabs{display:flex;gap:0;}
.refs-tab{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 16px;border:none;background:transparent;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.refs-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.refs-panel{display:none;flex:1;min-height:0;overflow-y:auto;flex-direction:column;}
.refs-panel.active{display:flex;}

/* ═══ LIVROS ═══ */
.books-toolbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.books-filters{display:flex;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none;}
.books-filters::-webkit-scrollbar{display:none;}
.bfilter{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid var(--b1);background:transparent;color:var(--muted2);cursor:pointer;white-space:nowrap;transition:all .15s;}
.bfilter.active{border-color:var(--accent);color:var(--accent);background:rgba(232,197,71,.08);}
.books-list{flex:1;overflow-y:auto;min-height:0;padding:12px 16px 24px;display:block;}
.books-list>*+*{margin-top:8px;}
.book-card{border:1px solid var(--b1);border-radius:10px;background:var(--s1);padding:12px 14px;display:flex;gap:12px;align-items:flex-start;}
.book-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.book-info{flex:1;min-width:0;}
.book-title{font-size:14px;font-weight:500;color:var(--text);}
.book-author{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;}
.book-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.book-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px;}
.book-rating{font-size:10px;color:var(--accent);}
.book-notes{font-size:11px;color:var(--muted2);margin-top:5px;line-height:1.5;}
.book-actions{display:flex;gap:4px;flex-shrink:0;}
.book-act-btn{width:26px;height:26px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.book-act-btn:hover{background:var(--b2);color:var(--text);}
.book-act-btn.del:hover{background:rgba(224,90,90,.15);color:var(--danger);}
.books-empty{text-align:center;padding:48px 16px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;line-height:2;}
/* ═══ ESTUDOS ═══ */
#view-studies{flex-direction:column;overflow:hidden;}
.studies-header{padding:16px 16px 12px;flex-shrink:0;border-bottom:1px solid var(--b1);}
.studies-title{font-family:var(--mono);font-size:15px;font-weight:700;}
.studies-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.studies-back{font-family:var(--mono);font-size:9px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.studies-body{flex:1;overflow-y:auto;min-height:0;padding:14px 16px 24px;display:block;}
.studies-body>*+*{margin-top:10px;}
.studies-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.subj-card-wrap{position:relative;display:flex;}
.subj-card{border:1px solid var(--b1);border-radius:10px;background:var(--s1);padding:10px 12px 9px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:6px;flex:1;}
.subj-card:active{transform:scale(.97);}
.subj-card:hover{border-color:var(--b2);}
.subj-card-top{display:flex;align-items:center;gap:8px;}
.subj-icon{font-size:18px;flex-shrink:0;}
.subj-name{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text);}
.subj-lvl{font-family:var(--mono);font-size:8px;margin-top:1px;}
.subj-prog-wrap{height:3px;background:var(--b2);border-radius:2px;}
.subj-prog-fill{height:100%;border-radius:2px;transition:width .5s;}
.subj-prog-label{font-family:var(--mono);font-size:8px;color:var(--muted);}
.subj-del-ext{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;border:1px solid var(--b2);background:var(--bg);color:var(--muted);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;z-index:2;}
.subj-del-ext:hover{background:var(--danger);border-color:var(--danger);color:#fff;}
.lvl-tabs{display:flex;border-bottom:1px solid var(--b1);background:var(--s2);}
.lvl-tab{flex:1;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:8px 0;border:none;background:transparent;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.lvl-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.lvl-tab-panel{display:none;flex-direction:column;}
.lvl-tab-panel.active{display:flex;}
.lvl-content{padding:14px 16px;display:flex;flex-direction:column;gap:14px;}
.lvl-content-desc{font-size:12px;color:var(--text);line-height:1.7;}
.lvl-content-resources{display:flex;flex-direction:column;gap:6px;}
.lvl-content-res-title{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.lvl-content-res-link{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);text-decoration:none;transition:background .1s;}
.lvl-content-res-link:hover{background:var(--b1);}
.lvl-content-res-name{font-size:12px;color:var(--text);flex:1;}
.lvl-content-res-arrow{font-size:11px;color:var(--muted);}
.lvl-challenges{padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.lvl-challenge{display:flex;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);}
.lvl-challenge-num{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);flex-shrink:0;width:18px;}
.lvl-challenge-text{font-size:12px;color:var(--text);line-height:1.6;}
.lvl-no-content{padding:20px 16px;font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;letter-spacing:1px;}
.lvl-legend{display:flex;gap:12px;padding:10px 0 2px;flex-wrap:wrap;}
.lvl-legend-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--muted);}
.lvl-legend-dot{width:8px;height:8px;border-radius:50%;}
.lvl-card{border:1px solid var(--b1);border-radius:10px;overflow:hidden;}
.lvl-card-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .1s;}
.lvl-card-hdr:hover{background:rgba(255,255,255,.02);}
.lvl-num{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1;width:28px;flex-shrink:0;text-align:center;}
.lvl-info{flex:1;}
.lvl-title{font-size:13px;font-weight:500;color:var(--text);}
.lvl-meta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;}
.lvl-badge{font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:10px;flex-shrink:0;}
.lvl-chevron{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.lvl-items{display:none;flex-direction:column;border-top:1px solid var(--b1);}
.lvl-items.open{display:flex;}
.lvl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s;user-select:none;}
.lvl-item:last-child{border-bottom:none;}
.lvl-item:hover{background:rgba(255,255,255,.02);}
.lvl-item.done{opacity:.5;}
.lvl-item-chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;}
.lvl-item.done .lvl-item-chk{background:var(--green);border-color:var(--green);}
.lvl-item-label{flex:1;font-size:12px;color:var(--text);line-height:1.5;word-break:break-word;padding-top:1px;}
.lvl-item.done .lvl-item-label{text-decoration:line-through;color:var(--muted);}
.lvl-complete-badge{display:none;align-items:center;gap:6px;padding:8px 14px;background:rgba(168,224,90,.06);border-top:1px solid rgba(168,224,90,.15);font-family:var(--mono);font-size:9px;color:var(--green);}
.lvl-complete-badge.show{display:flex;}
.lvl-card.completed{border-color:rgba(168,224,90,.25);}
.lvl-card.completed .lvl-card-hdr{background:rgba(168,224,90,.04);}

.refs-plano-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--b1);flex-shrink:0;}
.refs-plano-toolbar .btn{margin-left:auto;}
.refs-plano-toolbar .btn+.btn{margin-left:0;}
.refs-edit-actions{display:none;align-items:center;gap:6px;padding:6px 16px;background:var(--s2);border-bottom:1px solid var(--b1);}
.refs-edit-actions.visible{display:flex;}
.refs-phase.edit-mode .refs-phase-hdr{cursor:default;}
.refs-phase-edit-row{display:flex;align-items:center;gap:6px;padding:8px 16px;border-bottom:1px solid var(--b1);background:var(--s2);}
.refs-tech-edit-row{display:flex;align-items:center;gap:6px;padding:6px 16px 6px 42px;background:rgba(255,255,255,.02);}
.refs-add-btn{font-family:var(--mono);font-size:9px;color:var(--accent);background:transparent;border:1px dashed rgba(232,197,71,.3);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .15s;width:100%;}
.refs-add-btn:hover{border-color:var(--accent);background:rgba(232,197,71,.05);}
.refs-del-btn{width:24px;height:24px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.refs-del-btn:hover{background:rgba(224,90,90,.15);border-color:var(--danger);color:var(--danger);}
.refs-edit-btn{width:24px;height:24px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.refs-edit-btn:hover{background:var(--b2);color:var(--text);}
.refs-phase{border:1px solid var(--b1);border-radius:12px;overflow:hidden;}
.refs-phase-hdr{padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--b1);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.refs-phase-title{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.refs-phase-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;}
.refs-phase-chevron{font-size:13px;color:var(--muted);transition:transform .2s;display:inline-block;}
.refs-phase-body{display:none;flex-direction:column;gap:0;}
.refs-phase-body.open{display:flex;}
.refs-tech{border-bottom:1px solid var(--b1);}
.refs-tech:last-child{border-bottom:none;}
.refs-tech-hdr{padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.refs-tech-icon{font-size:16px;flex-shrink:0;}
.refs-tech-name{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text);flex:1;}
.refs-tech-slot{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;}
.refs-tech-chevron{font-size:11px;color:var(--muted);transition:transform .2s;display:inline-block;}
.refs-links{display:none;flex-direction:column;gap:0;background:var(--bg);padding:4px 0 8px;}
.refs-links.open{display:flex;}
.refs-link{display:flex;align-items:center;gap:12px;padding:8px 16px 8px 42px;text-decoration:none;transition:background .1s;}
.refs-link:hover{background:rgba(255,255,255,.03);}
.refs-link-info{flex:1;}
.refs-link-name{font-size:13px;color:var(--text);}
.refs-link-meta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;}
.refs-link-badge{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:6px;white-space:nowrap;}
.badge-free{background:rgba(168,224,90,.12);color:var(--green);}
.badge-paid{background:rgba(122,180,255,.12);color:var(--blue);}
.refs-link-arrow{font-size:12px;color:var(--muted);}
.refs-goal{padding:10px 16px;font-family:var(--mono);font-size:9px;color:var(--muted);line-height:1.6;border-top:1px solid var(--b1);background:var(--s2);}
.lvl-content-panel{padding:12px 14px;border-bottom:1px solid var(--b1);background:rgba(255,255,255,.01);}
.lvl-content-desc{font-size:12px;color:var(--text);line-height:1.7;margin-bottom:10px;}
.lvl-content-section{margin-bottom:10px;}
.lvl-content-section:last-child{margin-bottom:0;}
.lvl-content-section-title{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.lvl-content-link{display:flex;align-items:center;gap:8px;padding:5px 0;text-decoration:none;color:var(--blue);font-size:11px;transition:color .1s;}
.lvl-content-link:hover{color:var(--accent);}
.lvl-content-link::before{content:'↗';font-size:10px;color:var(--muted);flex-shrink:0;}
.lvl-challenge-list{list-style:none;display:flex;flex-direction:column;gap:5px;margin:0;padding:0;}
.lvl-challenge-item{font-size:11px;color:var(--text);padding:7px 10px;background:rgba(232,197,71,.05);border-left:2px solid var(--accent);border-radius:0 6px 6px 0;line-height:1.5;}
.lvl-items-sep{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);padding:7px 14px;background:var(--s2);border-bottom:1px solid var(--b1);text-transform:uppercase;}

/* DESKTOP */
@media(min-width:680px){
  .refs-body{max-width:680px;}
  .tracker-body{flex-direction:row;}
  .day-strip{flex-direction:column;width:150px;flex-shrink:0;overflow-y:auto;overflow-x:hidden;border-right:1px solid var(--b1);border-bottom:none;padding:14px 10px;align-items:stretch;gap:4px;}
  .day-pill{flex-direction:row;justify-content:space-between;padding:9px 12px;min-width:unset;}

  #view-editor{flex-direction:row;}
  .editor-left{width:170px;flex-shrink:0;border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;}
  .ed-daytabs{flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:10px;gap:4px;flex:1;}
  .ed-tab{text-align:left;}
  .editor-right{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .editor-topbar-mobile{display:none;}
  .modal-overlay{align-items:center;}
  .modal-sheet,.time-modal-sheet{border-radius:16px;max-height:80vh;}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">ROTINA<span>/</span>SEMANAL</div>
    <div class="week-badge" id="weekBadge">—</div>
  </header>
  <div class="views">

    <!-- ① TRACKER -->
    <div class="view active" id="view-tracker">
      <div class="score-banner">
        <div class="score-item">
          <span class="score-item-label">Esta semana</span>
          <span class="score-item-value" id="scoreCurrent">—</span>
          <span id="scoreCurrentSub" style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:2px;"></span>
        </div>
        <div class="score-item">
          <span class="score-item-label">Anterior</span>
          <span class="score-item-value" id="scorePrev" style="color:var(--muted2);">—</span>
          <span id="scorePrevSub" style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:2px;"></span>
        </div>
        <button class="view-toggle-btn" id="viewToggleBtn" onclick="toggleTrackerView()" title="Alternar visualização">
          <svg id="vtIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/><rect x="14" y="17" width="7" height="4" rx="1"/>
          </svg>
        </button>
      </div>
      <div class="tracker-body">
        <div class="day-strip" id="dayStrip"></div>
        <div class="tracker-panel">
          <div class="tasks-area" id="tasksList"></div>
          <div class="week-bar">
            <span class="wb-label">Semana</span>
            <div class="wb-track"><div class="wb-fill" id="weekFill" style="width:0%"></div></div>
            <span class="wb-pct" id="weekPct">0%</span>
          </div>
        </div>
        <div class="kanban-panel" id="kanbanPanel" style="display:none;"></div>
      </div>
    </div>

    <!-- ② HISTORY -->
    <div class="view" id="view-history">
      <div class="hist-header"><div class="hist-title">Histórico</div><div class="hist-sub">Pontuação por semana</div></div>
      <div class="hist-list" id="histList"></div>
    </div>

    <!-- ③ EDITOR -->
    <div class="view" id="view-editor">
      <div class="editor-left" id="edLeft" style="display:contents">
        <div class="editor-topbar" id="edTopDesktop">
          <span class="editor-day-label" id="edTitleD">—</span>
          <button class="btn" style="padding:5px 10px;font-size:9px;" onclick="showAddForm()">+ ADD</button>
        </div>
        <div class="ed-daytabs" id="edDayTabs"></div>
      </div>
      <div class="editor-right" id="edRight" style="display:contents">
        <div class="editor-topbar editor-topbar-mobile" id="edTopMobile">
          <span class="editor-day-label" id="edTitleM">—</span>
          <button class="btn" style="padding:5px 10px;font-size:9px;" onclick="showAddForm()">+ ADD</button>
        </div>
        <div class="editor-tasks" id="edTasksList"></div>
        <div class="editor-footer">
          <button class="btn btn-primary" onclick="saveChanges()">💾 Salvar</button>
          <button class="btn btn-danger" style="font-size:9px;" onclick="resetWeekChecks()">Limpar checks</button>
        </div>
      </div>
    </div>
    <!-- ④ MATERIAIS -->
    <div class="view" id="view-refs">
      <div class="refs-header">
        <div class="refs-title">Materiais</div>
        <div class="refs-tabs">
          <button class="refs-tab active" id="rtab-plano" onclick="switchRefsTab('plano')">Plano de estudo</button>
          <button class="refs-tab" id="rtab-livros" onclick="switchRefsTab('livros')">Livros</button>
        </div>
      </div>
      <div class="refs-panel active" id="rpanel-plano">
        <div class="refs-plano-toolbar">
          <button class="btn" id="refsEditBtn" onclick="toggleRefsEdit()" style="font-size:9px;padding:5px 12px;">✏ Editar</button>
          <button class="btn btn-primary" id="refsAddPhaseBtn" onclick="openPhaseForm()" style="font-size:9px;padding:5px 12px;display:none;">+ Categoria</button>
        </div>
        <div class="refs-body" id="refsBody"></div>
      </div>
      <div class="refs-panel" id="rpanel-livros">
        <div class="books-toolbar">
          <div class="books-filters" id="booksFilters"></div>
          <button class="btn btn-primary" style="font-size:9px;padding:5px 12px;flex-shrink:0;" onclick="openBookForm()">+ Livro</button>
        </div>
        <div class="books-list" id="booksList"></div>
      </div>
    </div>
    <!-- ⑤ ESTUDOS -->
    <div class="view" id="view-studies">

// ═══ STATE ═══
let routine={},checks={},history={},pending={};

// ═══ HELPERS ═══
const clone=o=>JSON.parse(JSON.stringify(o));
const todayIdx=()=>{const d=new Date().getDay();return d===0?6:d-1;};
function getMondayKey(offset=0){
  const n=new Date();
  n.setDate(n.getDate()-((n.getDay()+6)%7)+offset*7);
  const y=n.getFullYear();
  const m=String(n.getMonth()+1).padStart(2,'0');
  const d=String(n.getDate()).padStart(2,'0');
  return`${y}-${m}-${d}`;
}
function weekLabel(mon){const m=new Date(mon+'T12:00:00'),s=new Date(m);s.setDate(m.getDate()+6);const f=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});return f(m)+' – '+f(s);}
function gradeOf(score10){
  if(score10>=9)return{label:'S',cls:'gs',color:'var(--green)'};
  if(score10>=7)return{label:'A',cls:'ga',color:'var(--accent)'};
  if(score10>=5)return{label:'B',cls:'gb',color:'var(--blue)'};
  return{label:'C',cls:'gc',color:'var(--danger)'};
}
function calcScore(rout,chks){
  const all=Object.values(rout).flat();
  const totalPts=all.reduce((s,t)=>s+(t.points||1),0);
  const donePts=all.filter(t=>chks[t.id]).reduce((s,t)=>s+(t.points||1),0);
  const score10=totalPts?+(donePts/totalPts*10).toFixed(1):0;
  return{score10,donePts,totalPts};
}

function sortByTime(tasks){
  return [...tasks].sort((a,b)=>{
    const ta=parseTimeRange(a.time),tb=parseTimeRange(b.time);
    if(!ta&&!tb)return 0;
    if(!ta)return 1;
    if(!tb)return-1;
    return ta.start-tb.start;
  });
}
  // Expects "HH:MM–HH:MM", returns {start, end} in minutes or null
function parseTimeRange(timeStr){
  if(!timeStr)return null;
  const m=timeStr.match(/(\d{1,2}):(\d{2})[–\-](\d{1,2}):(\d{2})/);
  if(!m)return null;
  return{start:parseInt(m[1])*60+parseInt(m[2]),end:parseInt(m[3])*60+parseInt(m[4])};
}

function getConflictIds(tasks){
  const conflicts=new Set();
  for(let i=0;i<tasks.length;i++){
    const a=parseTimeRange(tasks[i].time);
    if(!a||a.start>=a.end)continue;
    for(let j=i+1;j<tasks.length;j++){
      const b=parseTimeRange(tasks[j].time);
      if(!b||b.start>=b.end)continue;
      if(a.start<b.end&&b.start<a.end){
        conflicts.add(tasks[i].id);
        conflicts.add(tasks[j].id);
      }
    }
  }
  return conflicts;
}

// ═══ STORAGE ADAPTER ═══
// Syncs via Cloudflare Worker KV — works on any device
const WORKER_URL = 'https://purple-bush-fd43.paulo-mreis7590.workers.dev';
const USER_ID = 'paulo';

const store = {
  async get(key){
    try{
      const r = await fetch(`${WORKER_URL}?key=${encodeURIComponent(key)}&user=${USER_ID}`);
      const json = await r.json();
      return json.value || null;
    } catch(e){ return localStorage.getItem(key); }
  },
  async set(key, value){
    try{
      await fetch(`${WORKER_URL}?key=${encodeURIComponent(key)}&user=${USER_ID}`, {
        method: 'PUT',
        body: value
      });
    } catch(e){}
    // Always keep localStorage as offline fallback
    try{ localStorage.setItem(key, value); } catch(e){}
  }
};

// ═══ STORAGE ═══

  routine=clone(DEFAULT_ROUTINE);

    if(r){
      const saved=JSON.parse(r);
      const hasSeg4=saved.Segunda&&saved.Segunda.some(t=>t.label&&t.label.includes('JavaScript'));
      if(hasSeg4)routine=saved;
      else await store.set('routine_data',JSON.stringify(routine));
    } else {
      await store.set('routine_data',JSON.stringify(routine));
    }
  }catch(e){}
  try{const c=await store.get('checks_'+getMondayKey());checks=c?JSON.parse(c):{};}
  catch(e){checks={};}
  try{const h=await store.get('week_history');history=h?JSON.parse(h):{};}
  catch(e){history={};}
  pending=clone(routine);
}
async function saveRoutine(){await store.set('routine_data',JSON.stringify(routine));}
async function saveChecks(){await store.set('checks_'+getMondayKey(),JSON.stringify(checks));}
async function saveHistory(){await store.set('week_history',JSON.stringify(history));}

function snapshotWeek(){
  const mon=getMondayKey();
  const {score10,donePts,totalPts}=calcScore(routine,checks);
  const days={};
  DAYS.forEach(d=>{
    const ts=routine[d]||[];
    const dPts=ts.reduce((s,t)=>s+(t.points||1),0);
    const ckPts=ts.filter(t=>checks[t.id]).reduce((s,t)=>s+(t.points||1),0);
    days[d]={
      totalPts:dPts,donePts:ckPts,
      total:ts.length,done:ts.filter(t=>checks[t.id]).length,
      tasks:ts.map(t=>({id:t.id,icon:t.icon,label:t.label,time:t.time,points:t.points||1,checked:!!checks[t.id]}))
    };
  });
  history[mon]={score10,donePts,totalPts,days,label:weekLabel(mon),pct:totalPts?Math.round(donePts/totalPts*100):0};
}

  const strip=document.getElementById('dayStrip');
  strip.innerHTML='';
  DAYS.forEach((d,i)=>{
    const ts=routine[d]||[];
    const totalPts=ts.reduce((s,t)=>s+(t.points||1),0);
    const donePts=ts.filter(t=>checks[t.id]).reduce((s,t)=>s+(t.points||1),0);
    const pct=totalPts?Math.round(donePts/totalPts*100):0;
    const allDone=ts.length>0&&donePts===totalPts;
    const pill=document.createElement('button');
    pill.className='day-pill'+(d===activeDay?' active':'')+(i===todayIdx()?' today':'')+(allDone?' all-done':'');
    pill.innerHTML=`<span class="dp-name">${DAYS_SHORT[i]}</span><span class="dp-pct">${pct}%</span>`;
    pill.onclick=()=>renderTracker(d);
    strip.appendChild(pill);
  });

  updateWeekBar();

function updateScoreBanner(){
  const {score10,donePts,totalPts}=calcScore(routine,checks);
  const g=gradeOf(score10);
  document.getElementById('scoreCurrent').textContent=score10.toFixed(1)+'/10';
  document.getElementById('scoreCurrent').style.color=g.color;
  document.getElementById('scoreCurrentSub').textContent=`· ${donePts}/${totalPts} pts`;

  const prevMon=getMondayKey(-1);
  const prev=history[prevMon];
  if(prev&&prev.score10!==undefined&&(prev.donePts||0)>0){
    const pg=gradeOf(prev.score10);
    document.getElementById('scorePrev').textContent=prev.score10.toFixed(1)+'/10';
    document.getElementById('scorePrev').style.color=pg.color;
    document.getElementById('scorePrevSub').textContent=`· ${prev.donePts}/${prev.totalPts} pts`;
  } else {
    document.getElementById('scorePrev').textContent='—';
    document.getElementById('scorePrev').style.color='var(--muted2)';
    document.getElementById('scorePrevSub').textContent='sem dados';
  }
}

function renderDayTasks(day){
  const ts=sortByTime(routine[day]||[]);
  const totalPts=ts.reduce((s,t)=>s+(t.points||1),0);
  const donePts=ts.filter(t=>checks[t.id]).reduce((s,t)=>s+(t.points||1),0);
  const pct=totalPts?Math.round(donePts/totalPts*100):0;
  const conflicts=getConflictIds(ts);
  const area=document.getElementById('tasksList');
  area.innerHTML=`
    <div class="day-hdr">
      <div class="day-title">${day}</div>
      <div class="day-pts">${donePts}/${totalPts} pts</div>
    </div>
    <div class="dprog-wrap"><div class="dprog-fill${pct===100?' done':''}" style="width:${pct}%"></div></div>`;
  if(!ts.length){area.innerHTML+='<div class="empty">NENHUMA TAREFA</div>';return;}
  ts.forEach(task=>{
    const ck=!!checks[task.id];
    const pts=task.points||1;

    card.className='task-card'+(ck?' checked':'')+(hasConflict?' conflict':'');

async function toggleCheck(id,day){
  checks[id]=!checks[id];
  snapshotWeek();
  await saveChecks();
  await saveHistory();
  if(trackerMode==='kanban'){renderKanban();updateWeekBar();updateScoreBanner();return;}
  renderDayTasks(day);
  updateWeekBar();

    const ts=routine[d]||[];

async function deleteTaskFromTracker(id,day){

  pending=clone(routine);
  delete checks[id];
  snapshotWeek();
  await saveRoutine();
  await saveChecks();
  await saveHistory();
  renderTracker(day);
  showToast('Tarefa excluída');
}

function renderHistory(){

    .sort((a,b)=>b.localeCompare(a));
  if(!keys.length){list.innerHTML='<div class="hist-empty">Nenhum histórico ainda.<br>Complete tarefas para<br>registrar semanas.</div>';return;}
  keys.forEach(mon=>{
    const h=history[mon];
    const score=h.score10||0;
    const g=gradeOf(score);
    const isCur=mon===getMondayKey();
    const card=document.createElement('div');
    card.className='hist-card';

      const dd=h.days&&h.days[day];if(!dd)return'';
      const dPts=dd.totalPts||0;
      const ckPts=dd.donePts||0;

      const uid=`${mon}_${i}`;
      return`<div class="h-day-row" onclick="toggleHistDay('${uid}')">
        <div class="h-day-name">${DAYS_SHORT[i]}</div>
        <div class="h-bar-wrap"><div class="h-bar-fill" style="width:${dp}%;background:${dg.color};"></div></div>

      <div class="h-detail">${dayRows}</div>`;

function buildDrum(containerId,items,initialVal){
  const wrap=document.getElementById(containerId);
  wrap.innerHTML='';
  const sel=document.createElement('div');sel.className='drum-selector';wrap.appendChild(sel);
  const listEl=document.createElement('div');listEl.className='drum-list';wrap.appendChild(listEl);
  items.forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='drum-item'+(item===initialVal?' active':'');
    el.textContent=item;
    el.onclick=()=>selectDrum(containerId,i,items);
    listEl.appendChild(el);
  });
  drums[containerId]={items,current:items.indexOf(initialVal)<0?0:items.indexOf(initialVal)};
  scrollDrum(containerId,drums[containerId].current,false);
}

function selectDrum(id,idx,items){
  drums[id].current=idx;
  scrollDrum(id,idx,true);
  document.querySelectorAll(`#${id} .drum-item`).forEach((el,i)=>el.classList.toggle('active',i===idx));
}

function scrollDrum(id,idx,animate){
  const wrap=document.getElementById(id);
  const list=wrap.querySelector('.drum-list');
  if(!animate)list.style.transition='none';
  else list.style.transition='transform .15s ease';
  list.style.transform=`translateY(${-idx*36}px)`;
}

function openTimeModal(idx,mode){
  timeModalCallback={idx,mode};
  let cur='08:00–18:00';
  if(mode==='task'&&idx>=0)cur=pending[activeCmsDay][idx].time||'08:00–09:00';
  else if(mode==='new'){const v=document.getElementById('newTimeVal');cur=v&&v.textContent!=='Definir horário'?v.textContent:'08:00–09:00';}
  const parts=cur.split('–');
  const [sh,sm]=(parts[0]||'08:00').split(':');
  const [eh,em]=(parts[1]||'09:00').split(':');
  timeState={startH:sh||'08',startM:sm||'00',endH:eh||'09',endM:em||'00'};
  buildDrum('startH',HOURS,timeState.startH);
  buildDrum('startM',MINS,timeState.startM);
  buildDrum('endH',HOURS,timeState.endH);
  buildDrum('endM',MINS,timeState.endM);
  document.getElementById('timeModal').classList.add('open');
}

function confirmTime(){
  const get=id=>drums[id]?drums[id].items[drums[id].current]:'00';
  const val=`${get('startH')}:${get('startM')}–${get('endH')}:${get('endM')}`;
  const {idx,mode}=timeModalCallback;
  if(mode==='task'&&idx>=0){
    pending[activeCmsDay][idx].time=val;
    renderEditorTasks(activeCmsDay);
  } else {
    newTaskTime=val;
    const v=document.getElementById('newTimeVal');
    if(v)v.textContent=val;
  }
  document.getElementById('timeModal').classList.remove('open');
}
function closeTimeModal(e){if(e.target===document.getElementById('timeModal'))document.getElementById('timeModal').classList.remove('open');}

let studiesData={};
let customSubjects=[];
let activeSubjectId=null;
let studiesEditMode=false;

async function loadStudies(){
  try{const r=await store.get('studies_data');if(r)studiesData=JSON.parse(r);}catch(e){studiesData={};}
  try{const r=await store.get('custom_subjects');if(r)customSubjects=JSON.parse(r);}catch(e){customSubjects=[];}
}
async function saveStudies(){await store.set('studies_data',JSON.stringify(studiesData));}
async function saveCustomSubjects(){await store.set('custom_subjects',JSON.stringify(customSubjects));}

function getSubjectProgress(subj){
  const totalLevels=subj.levels.length;
  const completedLevels=subj.levels.filter(lvl=>isLevelComplete(subj.id,lvl)).length;
  const totalItems=subj.levels.reduce((s,l)=>s+l.items.length,0);
  const doneItems=subj.levels.reduce((s,l)=>s+l.items.filter(it=>studiesData[it.id]).length,0);
  const pct=totalItems?Math.round(doneItems/totalItems*100):0;
  // current tier based on last completed level
  let tier='basico';
  subj.levels.forEach(lvl=>{if(isLevelComplete(subj.id,lvl))tier=lvl.tier;});
  return{totalLevels,completedLevels,totalItems,doneItems,pct,tier};
}

function isLevelComplete(subjId,lvl){
  return lvl.items.every(it=>studiesData[it.id]);
}

function switchLvlTab(li, tab){
  ['itens','conteudo','desafios'].forEach(t=>{
    document.getElementById(`lt_${li}_${t}`)?.classList.toggle('active',t===tab);
    document.getElementById(`ltp_${li}_${t}`)?.classList.toggle('active',t===tab);
  });
}

      </div>`;
    const grid=document.createElement('div');
    grid.className='studies-grid';
    const allSubjects=[...DEFAULT_SUBJECTS,...customSubjects];
    allSubjects.forEach(subj=>{
      const prog=getSubjectProgress(subj);
      const t=TIER[prog.tier];
      const isCustom=customSubjects.some(s=>s.id===subj.id);

      const wrap=document.createElement('div');
      wrap.className='subj-card-wrap';

      const card=document.createElement('div');
      card.className='subj-card';
      card.innerHTML=`
        <div class="subj-card-top">
          <div class="subj-icon">${subj.icon}</div>
          <div style="flex:1;min-width:0;">
            <div class="subj-name">${subj.name}</div>
            <div class="subj-lvl" style="color:${t.color};">Nível ${prog.completedLevels} · ${t.label}</div>
          </div>
        </div>
        <div class="subj-prog-wrap"><div class="subj-prog-fill" style="width:${prog.pct}%;background:${t.color};"></div></div>
        <div class="subj-prog-label">${prog.doneItems}/${prog.totalItems} itens · ${prog.pct}%</div>`;
      card.addEventListener('click',()=>openSubject(subj.id));
      wrap.appendChild(card);

      if(isCustom){
        const delBtn=document.createElement('button');
        delBtn.className='subj-del-ext';
        delBtn.textContent='✕';
        delBtn.title='Excluir área';
        delBtn.addEventListener('click',(e)=>{
          e.stopImmediatePropagation();
          e.preventDefault();
          deleteCustomSubject(subj.id);
        });
        wrap.appendChild(delBtn);
      }

      grid.appendChild(wrap);
    });
    body.appendChild(grid);
  }
}

let books=[];
let booksFilter='todos';
let editingBookId=null;

const BOOK_STATUS={
  quero:{label:'Quero ler',color:'var(--muted2)',bg:'rgba(100,100,130,.15)'},
  lendo:{label:'Lendo',color:'var(--accent)',bg:'rgba(232,197,71,.12)'},
  concluido:{label:'Concluído',color:'var(--green)',bg:'rgba(168,224,90,.12)'},
  pausado:{label:'Pausado',color:'var(--blue)',bg:'rgba(122,180,255,.12)'},
};

async function loadBooks(){
  try{const r=await store.get('books_data');books=r?JSON.parse(r):[];}
  catch(e){books=[];}
}
async function saveBooks(){
  await store.set('books_data',JSON.stringify(books));
}

function renderBooks(){
  // filters
  const filters=document.getElementById('booksFilters');
  const filterOpts=[
    {key:'todos',label:'Todos'},
    {key:'lendo',label:'📖 Lendo'},
    {key:'quero',label:'📚 Quero ler'},
    {key:'concluido',label:'✅ Concluídos'},
    {key:'pausado',label:'⏸ Pausados'},
  ];
  filters.innerHTML='';
  filterOpts.forEach(f=>{
    const btn=document.createElement('button');
    btn.className='bfilter'+(booksFilter===f.key?' active':'');
    btn.textContent=f.label;
    btn.onclick=()=>{booksFilter=f.key;renderBooks();};
    filters.appendChild(btn);
  });

  // list
  const list=document.getElementById('booksList');
  const filtered=booksFilter==='todos'?books:books.filter(b=>b.status===booksFilter);
  list.innerHTML='';

  if(!filtered.length){
    list.innerHTML=`<div class="books-empty">NENHUM LIVRO AQUI<br>${booksFilter==='todos'?'Clica em + Livro para adicionar':'Nenhum livro nesta categoria'}</div>`;
    return;
  }

  // sort: lendo first, then quero, pausado, concluido
  const order={lendo:0,quero:1,pausado:2,concluido:3};
  const sorted=[...filtered].sort((a,b)=>(order[a.status]||0)-(order[b.status]||0));

  sorted.forEach(book=>{
    const st=BOOK_STATUS[book.status]||BOOK_STATUS.quero;
    const stars=book.rating>0?'★'.repeat(book.rating)+'☆'.repeat(5-book.rating):'';
    const card=document.createElement('div');
    card.className='book-card';
    card.innerHTML=`
      <div class="book-status-dot" style="background:${st.color};"></div>
      <div class="book-info">
        <div class="book-title">${book.title}</div>
        ${book.author?`<div class="book-author">${book.author}</div>`:''}
        <div class="book-meta">
          <span class="book-badge" style="color:${st.color};background:${st.bg};">${st.label}</span>
          ${stars?`<span class="book-rating">${stars}</span>`:''}
        </div>
        ${book.notes?`<div class="book-notes">${book.notes}</div>`:''}
      </div>
      <div class="book-actions">
        <button class="book-act-btn" onclick="openBookForm('${book.id}')" title="Editar">✏</button>
        <button class="book-act-btn del" onclick="deleteBook('${book.id}')" title="Excluir">✕</button>
      </div>`;
    list.appendChild(card);
  });
}

function openBookForm(id){
  editingBookId=id||null;
  const book=id?books.find(b=>b.id===id):null;
  document.getElementById('bookModalTitle').textContent=book?'Editar livro':'Adicionar livro';
  document.getElementById('bfTitle').value=book?book.title:'';
  document.getElementById('bfAuthor').value=book?book.author:'';
  document.getElementById('bfStatus').value=book?book.status:'quero';
  document.getElementById('bfRating').value=book?book.rating:0;
  document.getElementById('bfNotes').value=book?book.notes:'';
  document.getElementById('bookModal').classList.add('open');
  setTimeout(()=>document.getElementById('bfTitle').focus(),100);
}

async function saveBook(){
  const title=document.getElementById('bfTitle').value.trim();
  if(!title){document.getElementById('bfTitle').focus();return;}
  const data={
    id:editingBookId||'book_'+Date.now(),
    title,
    author:document.getElementById('bfAuthor').value.trim(),
    status:document.getElementById('bfStatus').value,
    rating:parseInt(document.getElementById('bfRating').value)||0,
    notes:document.getElementById('bfNotes').value.trim(),
    updatedAt:Date.now(),
  };
  if(editingBookId){
    const idx=books.findIndex(b=>b.id===editingBookId);
    if(idx>=0)books[idx]=data;
  } else {
    books.unshift(data);
  }
  await saveBooks();
  document.getElementById('bookModal').classList.remove('open');
  renderBooks();
  showToast(editingBookId?'Livro atualizado':'Livro adicionado');
  editingBookId=null;
}

async function deleteBook(id){
  books=books.filter(b=>b.id!==id);
  await saveBooks();
  renderBooks();
  showToast('Livro removido');
}

  document.getElementById('lfType').value=link?link.type:'YouTube';
  document.getElementById('lfFree').value=link?(link.free?'1':'0'):'1';
  document.getElementById('lfLang').value=link?link.lang:'PT-BR';
  document.getElementById('lfUrl').value=link?link.url:'';
  document.getElementById('linkModal').classList.add('open');
  setTimeout(()=>document.getElementById('lfName').focus(),100);
}
async function saveLink(){
  const name=document.getElementById('lfName').value.trim();
  if(!name)return;
  const data={
    name,
    author:document.getElementById('lfAuthor').value.trim(),
    type:document.getElementById('lfType').value,
    free:document.getElementById('lfFree').value==='1',
    lang:document.getElementById('lfLang').value.trim()||'PT-BR',
    url:document.getElementById('lfUrl').value.trim(),
  };
  if(!REFS_DATA[editingPhaseIdx].techs[editingTechIdx].links)
    REFS_DATA[editingPhaseIdx].techs[editingTechIdx].links=[];
  if(editingLinkIdx!==null)REFS_DATA[editingPhaseIdx].techs[editingTechIdx].links[editingLinkIdx]=data;
  else REFS_DATA[editingPhaseIdx].techs[editingTechIdx].links.push(data);
  await saveRefs();
  document.getElementById('linkModal').classList.remove('open');
  renderRefs();
  showToast(editingLinkIdx!==null?'Material atualizado':'Material adicionado');
  editingLinkIdx=null;
}
async function deleteLink(pi,ti,li){
  REFS_DATA[pi].techs[ti].links.splice(li,1);
  await saveRefs();
  renderRefs();
  showToast('Material removido');
}
function closeLinkModal(e){if(!e||e.target===document.getElementById('linkModal'))document.getElementById('linkModal').classList.remove('open');}

function renderRefs(){
  const body=document.getElementById('refsBody');
  body.innerHTML='';
  if(!REFS_DATA.length){
    body.innerHTML='<div style="padding:32px 16px;font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;letter-spacing:1px;">NENHUMA CATEGORIA<br>Clica em Editar → + Categoria</div>';
    return;
  }
  REFS_DATA.forEach((phase,pi)=>{
    const sec=document.createElement('div');
    sec.className='refs-phase';
    if(refsEditMode){
      sec.innerHTML=`
        <div class="refs-phase-hdr" style="cursor:default;">
          <div style="flex:1;">
            <div class="refs-phase-title" style="color:${phase.color};">${phase.phase} <span style="color:var(--muted);font-weight:400;">· ${phase.label}</span></div>
            <div class="refs-phase-sub">${(phase.techs||[]).map(t=>t.name).join(' · ')||'Sem tecnologias'}</div>
          </div>
          <div style="display:flex;gap:4px;">
            <button class="refs-edit-btn" onclick="openPhaseForm(${pi})" title="Editar categoria">✏</button>
            <button class="refs-del-btn" onclick="deletePhase(${pi})" title="Excluir categoria">✕</button>
          </div>
        </div>
        <div class="refs-phase-body open">
          ${phase.goal?`<div class="refs-goal">${phase.goal}</div>`:''}
          ${(phase.techs||[]).map((tech,ti)=>`
            <div class="refs-tech">
              <div class="refs-tech-hdr" style="cursor:default;">
                <span class="refs-tech-icon">${tech.icon}</span>
                <span class="refs-tech-name">${tech.name}</span>
                <span class="refs-tech-slot" style="flex:1;">${tech.slot}</span>
                <button class="refs-edit-btn" onclick="openTechForm(${pi},${ti})" title="Editar">✏</button>
                <button class="refs-del-btn" onclick="deleteTech(${pi},${ti})" title="Excluir">✕</button>
              </div>
              <div class="refs-links open">
                ${(tech.links||[]).map((l,li)=>`
                  <div class="refs-link" style="cursor:default;">
                    <div class="refs-link-info">
                      <div class="refs-link-name">${l.name}</div>
                      <div class="refs-link-meta">${l.author} · ${l.type} · ${l.lang}</div>
                    </div>
                    <span class="refs-link-badge ${l.free?'badge-free':'badge-paid'}">${l.free?'Grátis':'Pago'}</span>
                    <button class="refs-edit-btn" onclick="openLinkForm(${pi},${ti},${li})" title="Editar">✏</button>
                    <button class="refs-del-btn" onclick="deleteLink(${pi},${ti},${li})" title="Excluir">✕</button>
                  </div>`).join('')}
                <div style="padding:6px 16px 8px;">
                  <button class="refs-add-btn" onclick="openLinkForm(${pi},${ti})">+ Material</button>
                </div>
              </div>
            </div>`).join('')}
          <div style="padding:8px 16px 10px;">
            <button class="refs-add-btn" onclick="openTechForm(${pi})">+ Tecnologia</button>
          </div>
        </div>`;
    } else {
      sec.innerHTML=`
        <div class="refs-phase-hdr" onclick="toggleRefsPhase(${pi})">
          <div>
            <div class="refs-phase-title" style="color:${phase.color};">${phase.phase} <span style="color:var(--muted);font-weight:400;">· ${phase.label}</span></div>
            <div class="refs-phase-sub">${(phase.techs||[]).map(t=>t.name).join(' · ')}</div>
          </div>
          <span class="refs-phase-chevron" id="rpc_${pi}">▼</span>
        </div>
        <div class="refs-phase-body" id="rpb_${pi}">
          ${phase.goal?`<div class="refs-goal">${phase.goal}</div>`:''}
          ${(phase.techs||[]).map((tech,ti)=>`
            <div class="refs-tech">
              <div class="refs-tech-hdr" onclick="toggleRefsTech(${pi},${ti})">
                <span class="refs-tech-icon">${tech.icon}</span>
                <span class="refs-tech-name">${tech.name}</span>
                <span class="refs-tech-slot">${tech.slot}</span>
                <span class="refs-tech-chevron" id="rtc_${pi}_${ti}">›</span>
              </div>
              <div class="refs-links" id="rtl_${pi}_${ti}">
                ${(tech.links||[]).map(l=>`
                  <a class="refs-link" href="${l.url}" target="_blank" rel="noopener">
                    <div class="refs-link-info">
                      <div class="refs-link-name">${l.name}</div>
                      <div class="refs-link-meta">${l.author} · ${l.type} · ${l.lang}</div>
                    </div>
                    <span class="refs-link-badge ${l.free?'badge-free':'badge-paid'}">${l.free?'Grátis':'Pago'}</span>
                    <span class="refs-link-arrow">↗</span>
                  </a>`).join('')}
              </div>
            </div>`).join('')}
        </div>`;
    }
    body.appendChild(sec);
  });
}

function toggleRefsPhase(pi){
  const body=document.getElementById(`rpb_${pi}`);
  const chev=document.getElementById(`rpc_${pi}`);
  const open=body.classList.toggle('open');
  chev.style.transform=open?'rotate(180deg)':'';
}

function toggleRefsTech(pi,ti){
  const links=document.getElementById(`rtl_${pi}_${ti}`);
  const chev=document.getElementById(`rtc_${pi}_${ti}`);
  const open=links.classList.toggle('open');
  chev.style.transform=open?'rotate(90deg)':'';
}
function applyLayout(){
  const isMob=window.innerWidth<680;
  const edLeft=document.getElementById('edLeft');
  const edRight=document.getElementById('edRight');
  if(!isMob){
    edLeft.style.cssText='display:flex;flex-direction:column;width:170px;flex-shrink:0;border-right:1px solid var(--b1);overflow:hidden;';
    edRight.style.cssText='display:flex;flex-direction:column;flex:1;overflow:hidden;';
    document.getElementById('edTopDesktop').style.display='flex';
    document.getElementById('edTopMobile').style.display='none';
  } else {
    edLeft.style.cssText='display:contents;';
    edRight.style.cssText='display:contents;';
    document.getElementById('edTopDesktop').style.display='none';
    document.getElementById('edTopMobile').style.display='flex';
  }
}

// ═══ VIEW SWITCH ═══
function switchView(view,btn){
  currentView=view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  btn.classList.add('active');
  applyLayout();
  if(view==='tracker')renderTracker(activeDay);
  if(view==='history')renderHistory();
  if(view==='studies')renderStudies();
  if(view==='refs')renderRefs();
  if(view==='editor')renderEditor(activeCmsDay);
}

// ═══ TOAST ═══
let toastTmr;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.classList.remove('show'),2400);}

// ═══ SERVICE WORKER & NOTIFICAÇÕES ═══
async function registerSW(){
  if(!('serviceWorker' in navigator))return;
  try{
    await navigator.serviceWorker.register('/sw.js');
  }catch(e){console.warn('SW registro falhou:',e);}
}

async function requestNotificationPermission(){
  if(!('Notification' in window))return false;
  if(Notification.permission==='granted')return true;
  if(Notification.permission==='denied')return false;
  const result=await Notification.requestPermission();
  return result==='granted';
}

function scheduleNotifications(){
  if(!('serviceWorker' in navigator)||Notification.permission!=='granted')return;
  navigator.serviceWorker.ready.then(reg=>{
    const now=new Date();
    const todayIdx_=todayIdx();
    const dayName=DAYS[todayIdx_];
    const tasks=sortByTime(routine[dayName]||[]);
    tasks.forEach(task=>{
      if(checks[task.id])return; // já marcada, não notifica
      const t=parseTimeRange(task.time);
      if(!t)return;
      const h=Math.floor(t.start/60);
      const m=t.start%60;
      const target=new Date();
      target.setHours(h,m,0,0);
      const delay=target-now;
      if(delay<0||delay>8*60*60*1000)return; // só próximas 8h
      setTimeout(()=>{
        if(checks[task.id])return; // checou entre agora e o horário
        reg.showNotification('Rotina',{
          body:`${task.icon} ${task.label} · ${task.time}`,
          icon:'/icon-192.png',
          badge:'/icon-192.png',
          tag:task.id,
          renotify:false,
        });
      },delay);
    });
  });
}

// ═══ INIT ═══
window.addEventListener('resize',()=>{applyLayout();if(currentView==='editor')renderEditor(activeCmsDay);});
(async()=>{
  await registerSW();
  await loadAll();
  await loadBooks();
  await loadRefs();
  await loadStudies();
  snapshotWeek();
  await saveHistory();
  applyLayout();
  renderTracker();
  // Pede permissão e agenda notificações
  const granted=await requestNotificationPermission();
  if(granted)scheduleNotifications();
})();
</script>
