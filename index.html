<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0c0c10"/>
<title>Rotina</title>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">ROTINA<span>/</span>SEMANAL</div>
    <div class="week-badge" id="weekBadge">—</div>
  </header>
  <div class="views">

    <!-- ① TRACKER -->
    <div class="view active" id="view-tracker">
      <div class="score-banner">
        <div class="score-item">
          <span class="score-item-label">Esta semana</span>
          <span class="score-item-value" id="scoreCurrent">—</span>
          <span id="scoreCurrentSub" style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:2px;"></span>
        </div>
        <div class="score-item">
          <span class="score-item-label">Anterior</span>
          <span class="score-item-value" id="scorePrev" style="color:var(--muted2);">—</span>
          <span id="scorePrevSub" style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:2px;"></span>
        </div>
        <button class="view-toggle-btn" id="viewToggleBtn" onclick="toggleTrackerView()" title="Alternar visualização">
          <svg id="vtIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="11" rx="1"/><rect x="14" y="17" width="7" height="4" rx="1"/>
          </svg>
        </button>
      </div>
      <div class="tracker-body">
        <div class="day-strip" id="dayStrip"></div>
        <div class="tracker-panel">
          <div class="tasks-area" id="tasksList"></div>
          <div class="week-bar">
            <span class="wb-label">Semana</span>
            <div class="wb-track"><div class="wb-fill" id="weekFill" style="width:0%"></div></div>
            <span class="wb-pct" id="weekPct">0%</span>
          </div>
        </div>
        <div class="kanban-panel" id="kanbanPanel" style="display:none;"></div>
      </div>
    </div>

    <!-- ② HISTORY -->
    <div class="view" id="view-history">
      <div class="hist-header"><div class="hist-title">Histórico</div><div class="hist-sub">Pontuação por semana</div></div>
      <div class="hist-list" id="histList"></div>
    </div>

    <!-- ③ EDITOR -->
    <div class="view" id="view-editor">
      <div class="editor-left" id="edLeft" style="display:contents">
        <div class="editor-topbar" id="edTopDesktop">
          <span class="editor-day-label" id="edTitleD">—</span>
          <button class="btn" style="padding:5px 10px;font-size:9px;" onclick="showAddForm()">+ ADD</button>
        </div>
        <div class="ed-daytabs" id="edDayTabs"></div>
      </div>
      <div class="editor-right" id="edRight" style="display:contents">
        <div class="editor-topbar editor-topbar-mobile" id="edTopMobile">
          <span class="editor-day-label" id="edTitleM">—</span>
          <button class="btn" style="padding:5px 10px;font-size:9px;" onclick="showAddForm()">+ ADD</button>
        </div>
        <div class="editor-tasks" id="edTasksList"></div>
        <div class="editor-footer">
          <button class="btn btn-primary" onclick="saveChanges()">💾 Salvar</button>
          <button class="btn btn-danger" style="font-size:9px;" onclick="resetWeekChecks()">Limpar checks</button>
        </div>
      </div>
    </div>
    <!-- ④ MATERIAIS -->
    <div class="view" id="view-refs">
      <div class="refs-header">
        <div class="refs-title">Materiais</div>
        <div class="refs-tabs">
          <button class="refs-tab active" id="rtab-plano" onclick="switchRefsTab('plano')">Plano de estudo</button>
          <button class="refs-tab" id="rtab-livros" onclick="switchRefsTab('livros')">Livros</button>
        </div>
      </div>
      <div class="refs-panel active" id="rpanel-plano">
        <div class="refs-plano-toolbar">
          <button class="btn" id="refsEditBtn" onclick="toggleRefsEdit()" style="font-size:9px;padding:5px 12px;">✏ Editar</button>
          <button class="btn btn-primary" id="refsAddPhaseBtn" onclick="openPhaseForm()" style="font-size:9px;padding:5px 12px;display:none;">+ Categoria</button>
        </div>
        <div class="refs-body" id="refsBody"></div>
      </div>
      <div class="refs-panel" id="rpanel-livros">
        <div class="books-toolbar">
          <div class="books-filters" id="booksFilters"></div>
          <button class="btn btn-primary" style="font-size:9px;padding:5px 12px;flex-shrink:0;" onclick="openBookForm()">+ Livro</button>
        </div>
        <div class="books-list" id="booksList"></div>
      </div>
    </div>
    <!-- ⑤ ESTUDOS -->
    <div class="view" id="view-studies">
      <div class="studies-header" id="studiesHeader">
        <div class="studies-title">Estudos</div>
        <div class="studies-sub">Seleciona uma área para estudar</div>
      </div>
      <div class="studies-body" id="studiesBody"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="bnav-btn active" id="bn-tracker" onclick="switchView('tracker',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="5" width="6" height="6" rx="1"/><rect x="3" y="13" width="6" height="6" rx="1"/><line x1="13" y1="8" x2="21" y2="8"/><line x1="13" y1="16" x2="21" y2="16"/></svg>
      Tracker
    </button>
    <button class="bnav-btn" id="bn-history" onclick="switchView('history',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Histórico
    </button>
    <button class="bnav-btn" id="bn-studies" onclick="switchView('studies',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      Estudos
    </button>
    <button class="bnav-btn" id="bn-refs" onclick="switchView('refs',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Materiais
    </button>
    <button class="bnav-btn" id="bn-editor" onclick="switchView('editor',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Editor
    </button>
  </nav>
</div>

<!-- ICON PICKER MODAL -->
<div class="modal-overlay" id="iconModal" onclick="closeIconModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Escolher ícone</div>
    <div class="icon-grid" id="iconGrid"></div>
  </div>
</div>

<!-- TIME PICKER MODAL -->
<div class="modal-overlay" id="timeModal" onclick="closeTimeModal(event)">
  <div class="time-modal-sheet">
    <div class="modal-handle"></div>
    <div class="time-modal-hdr">
      <span class="time-modal-title">Período</span>
      <button class="time-modal-done" onclick="confirmTime()">Confirmar</button>
    </div>
    <div class="time-pickers-wrap">
      <div class="time-picker-group">
        <div class="tpg-label">Início</div>
        <div class="tpg-pickers">
          <div class="drum-wrap" id="startH"></div>
          <div class="time-sep">:</div>
          <div class="drum-wrap" id="startM"></div>
        </div>
      </div>
      <div class="between-label">até</div>
      <div class="time-picker-group">
        <div class="tpg-label">Fim</div>
        <div class="tpg-pickers">
          <div class="drum-wrap" id="endH"></div>
          <div class="time-sep">:</div>
          <div class="drum-wrap" id="endM"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PHASE FORM MODAL -->
<div class="modal-overlay" id="phaseModal" onclick="closePhaseModal(event)">
  <div class="modal-sheet" style="padding:0 0 16px;">
    <div class="modal-handle"></div>
    <div class="modal-title" id="phaseModalTitle">Nova categoria</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px;">
      <input class="ifield" id="pfName" type="text" placeholder="Nome (ex: Fase 1)" style="width:100%;"/>
      <input class="ifield" id="pfLabel" type="text" placeholder="Período (ex: meses 1–2)" style="width:100%;"/>
      <textarea class="ifield" id="pfGoal" placeholder="Objetivo desta fase" rows="2" style="width:100%;resize:none;font-family:var(--sans);"></textarea>
      <div style="display:flex;gap:8px;">
        <label style="font-family:var(--mono);font-size:9px;color:var(--muted);align-self:center;">Cor:</label>
        <select class="ifield" id="pfColor" style="flex:1;">
          <option value="var(--accent)">Amarelo</option>
          <option value="var(--blue)">Azul</option>
          <option value="var(--green)">Verde</option>
          <option value="var(--danger)">Vermelho</option>
          <option value="var(--muted2)">Cinza</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-primary" style="flex:1;" onclick="savePhase()">Salvar</button>
        <button class="btn" onclick="closePhaseModal()" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- TECH FORM MODAL -->
<div class="modal-overlay" id="techModal" onclick="closeTechModal(event)">
  <div class="modal-sheet" style="padding:0 0 16px;">
    <div class="modal-handle"></div>
    <div class="modal-title" id="techModalTitle">Nova tecnologia</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;gap:8px;">
        <button class="ifield-icon-btn" id="tfIconBtn" onclick="openIconModal(-1,'tech')" title="Escolher ícone" style="flex-shrink:0;">📌</button>
        <input class="ifield" id="tfName" type="text" placeholder="Nome (ex: Python)" style="flex:1;"/>
      </div>
      <input class="ifield" id="tfSlot" type="text" placeholder="Horário (ex: Seg/Ter · 18:45–19:30)" style="width:100%;"/>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveTech()">Salvar</button>
        <button class="btn" onclick="closeTechModal()" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- LINK FORM MODAL -->
<div class="modal-overlay" id="linkModal" onclick="closeLinkModal(event)">
  <div class="modal-sheet" style="padding:0 0 16px;">
    <div class="modal-handle"></div>
    <div class="modal-title" id="linkModalTitle">Novo material</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px;">
      <input class="ifield" id="lfName" type="text" placeholder="Nome do material" style="width:100%;"/>
      <input class="ifield" id="lfAuthor" type="text" placeholder="Autor / Canal" style="width:100%;"/>
      <div style="display:flex;gap:8px;">
        <select class="ifield" id="lfType" style="flex:1;">
          <option>YouTube</option>
          <option>Site</option>
          <option>Curso</option>
          <option>Livro</option>
          <option>Docs</option>
          <option>Jogo</option>
          <option>Outro</option>
        </select>
        <select class="ifield" id="lfFree" style="width:100px;">
          <option value="1">Grátis</option>
          <option value="0">Pago</option>
        </select>
      </div>
      <input class="ifield" id="lfLang" type="text" placeholder="Idioma (ex: PT-BR)" style="width:100%;"/>
      <input class="ifield" id="lfUrl" type="url" placeholder="URL" style="width:100%;"/>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveLink()">Salvar</button>
        <button class="btn" onclick="closeLinkModal()" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- SUBJECT FORM MODAL -->
<div class="modal-overlay" id="subjectModal" onclick="closeSubjectModal(event)">
  <div class="modal-sheet" style="padding:0 0 16px;">
    <div class="modal-handle"></div>
    <div class="modal-title">Nova área de estudo</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;gap:8px;">
        <button class="ifield-icon-btn" id="sfIconBtn" onclick="openIconModal(-1,'subj')" style="flex-shrink:0;">📌</button>
        <input class="ifield" id="sfName" type="text" placeholder="Nome (ex: TypeScript)" style="flex:1;"/>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveSubjectForm()">Criar área</button>
        <button class="btn" onclick="closeSubjectModal()" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- LEVEL FORM MODAL -->
<div class="modal-overlay" id="lvlFormModal" onclick="closeLvlFormModal(event)">
  <div class="modal-sheet" style="padding:0 0 16px;">
    <div class="modal-handle"></div>
    <div class="modal-title" id="lvlFormTitle">Novo nível</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px;">
      <input class="ifield" id="lfTitle" type="text" placeholder="Título do nível (ex: Fundamentos)" style="width:100%;"/>
      <select class="ifield" id="lfTier" style="width:100%;">
        <option value="basico">🔴 Básico</option>
        <option value="intermediario">🟡 Intermediário</option>
        <option value="avancado">🟢 Avançado</option>
      </select>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveLvlForm()">Salvar</button>
        <button class="btn" onclick="closeLvlFormModal()" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- ITEM FORM MODAL -->
<div class="modal-overlay" id="itemFormModal" onclick="closeItemFormModal(event)">
  <div class="modal-sheet" style="padding:0 0 16px;">
    <div class="modal-handle"></div>
    <div class="modal-title">Novo item</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px;">
      <input class="ifield" id="ifTitle" type="text" placeholder="Descrição do item" style="width:100%;"/>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveItemForm()">Salvar</button>
        <button class="btn" onclick="closeItemFormModal()" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- BOOK FORM MODAL -->
<div class="modal-overlay" id="bookModal" onclick="closeBookModal(event)">
  <div class="modal-sheet" style="padding:0 0 16px;">
    <div class="modal-handle"></div>
    <div class="modal-title" id="bookModalTitle">Adicionar livro</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px;">
      <input class="ifield" id="bfTitle" type="text" placeholder="Título" style="width:100%;"/>
      <input class="ifield" id="bfAuthor" type="text" placeholder="Autor" style="width:100%;"/>
      <div style="display:flex;gap:8px;">
        <select class="ifield" id="bfStatus" style="flex:1;">
          <option value="quero">📚 Quero ler</option>
          <option value="lendo">📖 Lendo</option>
          <option value="concluido">✅ Concluído</option>
          <option value="pausado">⏸ Pausado</option>
        </select>
        <select class="ifield" id="bfRating" style="width:110px;">
          <option value="0">Sem nota</option>
          <option value="1">★ 1</option>
          <option value="2">★★ 2</option>
          <option value="3">★★★ 3</option>
          <option value="4">★★★★ 4</option>
          <option value="5">★★★★★ 5</option>
        </select>
      </div>
      <textarea class="ifield" id="bfNotes" placeholder="Notas (opcional)" rows="2" style="width:100%;resize:none;font-family:var(--sans);"></textarea>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-primary" style="flex:1;" onclick="saveBook()">Salvar</button>
        <button class="btn" onclick="closeBookModal()" style="flex:1;">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>


  <script src="app.js"></script>
</body>
</html>
